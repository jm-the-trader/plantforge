name: Deploy to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages on every push to main.
#
# One-time setup:
#   1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. Settings → Secrets and variables → Actions → Variables → add:
#        VITE_SUPABASE_URL       = your Supabase project URL
#        VITE_SUPABASE_ANON_KEY  = your Supabase anon (public) key
#      (Variables, not Secrets — these are public client keys. NEVER add the
#       service_role key anywhere.) Without them, the app builds in local mode.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
      - name: SPA fallback
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
